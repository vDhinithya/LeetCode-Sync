name: Sync LeetCode Submissions

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Run Sync Application
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
        run: mvn clean compile exec:java -Dexec.mainClass="LeetCodeSync"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "LeetCode Sync Bot"
          git config --global user.email "actions@github.com"
          git add Daily-Practice/
          git diff-index --quiet HEAD || git commit -m "Auto-sync latest LeetCode solutions"
          git push